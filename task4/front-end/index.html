<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docker Full Stack</title>
</head>
<body>
    <h1>Front-end is working!</h1>
    <div id="api-data">Waiting for Back-end...</div>

    <script>
        // Back-end serverimizə sorğu göndəririk
        // Port 5000-dəki API-dan cavab gözləyirik
        fetch('http://localhost:5000/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('api-data').innerText = "Back-end says: " + data;
            })
            .catch(error => {
                document.getElementById('api-data').innerText = "Error: Cannot connect to Back-end.";
                console.error('Error:', error);
            });
    </script>
</body>
</html>
